# Khawam Printing - Staging
# Run from repo root: docker compose -f deploy/docker-compose.staging.yml up -d

services:
  postgres-staging:
    image: postgres:16-alpine
    container_name: khawam-postgres-staging
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-khawam_staging}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-khawam_staging}
    volumes:
      - postgres_staging_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U khawam_staging -d khawam_staging"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - khawam-staging

  pgbouncer-staging:
    image: edoburu/pgbouncer:1.22.1-p0
    container_name: khawam-pgbouncer-staging
    restart: always
    depends_on:
      postgres-staging:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-khawam_staging}:${POSTGRES_PASSWORD}@postgres-staging:5432/${POSTGRES_DB:-khawam_staging}
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 10
      AUTH_TYPE: scram-sha-256
    networks:
      - khawam-staging

  backend-staging:
    build:
      context: .
      dockerfile: deploy/docker/backend.Dockerfile
    image: khawam/backend-staging:latest
    container_name: khawam-backend-staging
    restart: always
    ports:
      - "127.0.0.1:3081:8000"
    depends_on:
      pgbouncer-staging:
        condition: service_started
      postgres-staging:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8000
      DATABASE_URL: postgresql://${POSTGRES_USER:-khawam_staging}:${POSTGRES_PASSWORD}@pgbouncer-staging:5432/${POSTGRES_DB:-khawam_staging}
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER:-khawam_staging}:${POSTGRES_PASSWORD}@postgres-staging:5432/${POSTGRES_DB:-khawam_staging}
      PGBOUNCER_ENABLED: "true"
      DB_CONNECTION_LIMIT: "10"
      QUEUE_POOL_MAX: "3"
      SECRET_KEY: ${SECRET_KEY}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-https://staging.example.com}
      FRONTEND_URL: ${FRONTEND_URL:-https://staging.example.com}
    networks:
      - khawam-staging

  frontend-staging:
    build:
      context: .
      dockerfile: deploy/docker/frontend.Dockerfile
      args:
        VITE_API_URL: /api
    image: khawam/frontend-staging:latest
    container_name: khawam-frontend-staging
    restart: always
    ports:
      - "127.0.0.1:3080:80"
    networks:
      - khawam-staging

networks:
  khawam-staging:
    driver: bridge

volumes:
  postgres_staging_data:
